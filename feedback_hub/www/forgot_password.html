<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{{ title }} - Feedback Hub</title>
	<link rel="stylesheet" href="/assets/feedback_hub/css/design_system.css?v=12">
</head>
<body class="fh-body">
	<header class="fh-navbar">
		<span class="fh-brand">Feedback Hub</span>
		<nav>
			<a href="/login">Log In</a>
			<a href="/signup">Sign Up</a>
		</nav>
	</header>

	<main class="fh-page-center">
		<div class="fh-panel">
			<h1>Forgot your password?</h1>
			<p class="fh-subtitle">Enter your email and we'll send you a reset link.</p>

			<div id="fh-alert" class="fh-alert"></div>

			<form id="fh-forgot-form">
				<div class="fh-field">
					<label for="email">Email <span class="fh-required">*</span></label>
					<input type="email" id="email" name="email" required autocomplete="email">
				</div>
				<div class="fh-footer-actions">
					<button type="submit" class="fh-btn fh-btn-primary fh-btn-block" id="fh-submit">Send Reset Link</button>
				</div>
			</form>

			<p class="fh-panel-footer-text"><a href="/login">Back to log in</a></p>
		</div>
	</main>

	<script src="/assets/feedback_hub/js/fh_api.js?v=12"></script>
	<script src="/assets/feedback_hub/js/forgot_password.js?v=12"></script>
</body>
</html>
