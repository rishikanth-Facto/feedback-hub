<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{{ title }} - Feedback Hub</title>
	<link rel="stylesheet" href="/assets/feedback_hub/css/design_system.css?v=12">
</head>
<body class="fh-body">
	<header class="fh-navbar">
		<span class="fh-brand">Feedback Hub</span>
		<nav>
			<a href="/login" class="active">Log In</a>
			<a href="/signup">Sign Up</a>
		</nav>
	</header>

	<main class="fh-page-center">
		<div class="fh-panel">
			<h1>Welcome back</h1>
			<p class="fh-subtitle">Log in to your Feedback Hub account.</p>

			<div id="fh-alert" class="fh-alert"></div>

			<form id="fh-login-form">
				<div class="fh-field">
					<label for="usr">Email <span class="fh-required">*</span></label>
					<!-- type="text", not "email": the site Administrator account logs in
					     with the literal username "Administrator", not an email address. -->
					<input type="text" id="usr" name="usr" required autocomplete="username">
				</div>
				<div class="fh-field">
					<label for="pwd">Password <span class="fh-required">*</span></label>
					<input type="password" id="pwd" name="pwd" required autocomplete="current-password">
				</div>
				<div class="fh-panel-footer-text" style="text-align: right; margin: -0.5rem 0 1rem;">
					<a href="/forgot_password">Forgot password?</a>
				</div>
				<div class="fh-footer-actions">
					<button type="submit" class="fh-btn fh-btn-primary fh-btn-block" id="fh-submit">Log In</button>
				</div>
			</form>

			<p class="fh-panel-footer-text">Don't have an account? <a href="/signup">Sign up</a></p>
		</div>
	</main>

	<script src="/assets/feedback_hub/js/fh_api.js?v=12"></script>
	<script src="/assets/feedback_hub/js/login.js?v=12"></script>
</body>
</html>
